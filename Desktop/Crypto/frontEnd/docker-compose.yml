services:
  cryptopeak-frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cryptopeak-frontend
    ports:
      - "3000:80"
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    networks:
      - cryptopeak-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    depends_on:
      - cryptopeak-backend

  cryptopeak-backend:
    image: cryptopeak-backend:latest
    container_name: cryptopeak-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_PATH=/app/data/cryptopeak.db
      - JWT_SECRET=${JWT_SECRET:-changeThisSecretInProduction}
      - JWT_EXPIRATION_MS=86400000
      - LOG_PATH=/app/logs/application.log
    volumes:
      - cryptopeak-data:/app/data
      - cryptopeak-logs:/app/logs
    restart: unless-stopped
    networks:
      - cryptopeak-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  cryptopeak-data:
    driver: local
  cryptopeak-logs:
    driver: local

networks:
  cryptopeak-network:
    driver: bridge