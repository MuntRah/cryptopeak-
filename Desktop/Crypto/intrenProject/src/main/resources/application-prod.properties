# Production Configuration
server.error.include-stacktrace=never
server.error.include-message=never

# SQLite Database Configuration (Production - use absolute path or environment variable)
spring.datasource.url=jdbc:sqlite:${DB_PATH:/var/lib/cryptopeak/cryptopeak.db}
spring.datasource.driverClassName=org.sqlite.JDBC
spring.datasource.username=
spring.datasource.password=

# SQLite Connection Pool Settings (optimized for SQLite single-writer limitation)
spring.datasource.hikari.maximum-pool-size=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect.storage_engine=innodb

# JWT Configuration (use environment variables in production)
jwt-secret=${JWT_SECRET}
jwt-expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Logging
logging.level.root=WARN
logging.level.com.example.cryptopeak=INFO
logging.file.name=${LOG_PATH:/var/log/cryptopeak/application.log}
logging.file.max-size=10MB
logging.file.max-history=30

# Security Headers
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict
